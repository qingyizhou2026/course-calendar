<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程日历</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #fff7ed 100%);
      color: #263238;
    }
    header {
      padding: 28px 20px 18px;
      text-align: center;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #2463eb;
    }
    header p { margin: 0; color: #64748b; }
    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto 32px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
    }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
      padding: 18px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .month-title {
      font-size: 24px;
      font-weight: 800;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      background: #2463eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #e0ecff; color: #1d4ed8; }
    button.danger { background: #fee2e2; color: #b91c1c; padding: 4px 8px; font-size: 12px; }
    .main-column { display: flex; flex-direction: column; gap: 18px; }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
      background: #e5e7eb;
      gap: 1px;
    }
    .weekday, .day {
      background: white;
      min-height: 96px;
      padding: 8px;
    }
    .weekday {
      min-height: auto;
      text-align: center;
      font-weight: 800;
      color: #475569;
      background: #f8fafc;
    }
    .day.muted { background: #f8fafc; color: #94a3b8; }
    .day.today { outline: 3px solid #fbbf24; outline-offset: -3px; }
    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .add-mini {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      font-size: 16px;
      line-height: 24px;
    }
    .lesson {
      margin-top: 5px;
      padding: 5px 6px;
      border-radius: 9px;
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      font-size: 12px;
      line-height: 1.35;
    }
    .lesson strong { display: block; color: #1e40af; }
    .side { display: flex; flex-direction: column; gap: 18px; }
    h2 { margin: 0 0 14px; font-size: 20px; }
    label { display: block; margin: 10px 0 6px; font-weight: 700; color: #334155; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font: inherit;
      background: white;
    }
    textarea { resize: vertical; min-height: 70px; }
    .form-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .edit-hint { margin-top: 10px; color: #2563eb; font-size: 13px; font-weight: 700; }
    .stats-list { display: flex; flex-direction: column; gap: 8px; }
    .records-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .stat-item, .record-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 10px;
      border-radius: 12px;
    }
    .subject-group {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
    }
    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .subject-header h3 { margin: 0; font-size: 18px; color: #1e40af; }
    .subject-items { display: flex; flex-direction: column; gap: 8px; }
    .record-item { align-items: flex-start; background: white; }
    .record-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .record-actions button { padding: 4px 8px; font-size: 12px; }
    .count {
      min-width: 54px;
      text-align: center;
      background: #dcfce7;
      color: #166534;
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 800;
    }
    .empty { color: #94a3b8; text-align: center; padding: 16px 0; }
    @media (max-width: 860px) {
      .container { grid-template-columns: 1fr; }
      .weekday, .day { min-height: 82px; padding: 6px; }
      header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 课程日历</h1>
    <p>记录每次上课时间，并自动统计每门课程的上课次数</p>
  </header>

  <main class="container">
    <div class="main-column">
      <section class="card">
        <div class="toolbar">
          <button class="secondary" id="prevMonth">← 上个月</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="secondary" id="nextMonth">下个月 →</button>
        </div>
        <div class="calendar" id="calendar"></div>
      </section>

      <section class="card">
        <h2>全部课程记录</h2>
        <div id="records" class="records-list"></div>
      </section>
    </div>

    <aside class="side">
      <section class="card">
        <h2>添加课程</h2>
        <form id="lessonForm">
          <label for="lessonDate">上课日期</label>
          <input type="date" id="lessonDate" required />

          <label for="studentName">名称</label>
          <select id="studentName">
            <option value="悠悠" selected>悠悠</option>
            <option value="露露">露露</option>
            <option value="">不填写</option>
          </select>

          <label for="courseName">课程名称</label>
          <input type="text" id="courseName" placeholder="例如：数学、英语、钢琴" required />

          <label for="lessonTime">上课时间</label>
          <input type="text" id="lessonTime" placeholder="例如：18:00-19:00，可不填写" />

          <label for="lessonDuration">课程时长</label>
          <select id="lessonDuration">
            <option value="0.5">0.5 小时</option>
            <option value="1" selected>1 小时</option>
            <option value="1.5">1.5 小时</option>
            <option value="2">2 小时</option>
          </select>

          <label for="lessonNote">备注</label>
          <textarea id="lessonNote" placeholder="可选：老师、地点、课堂内容等"></textarea>

          <div class="form-actions">
            <button type="submit" id="submitLesson">添加课程</button>
            <button type="button" class="secondary" id="clearForm">清空</button>
          </div>
          <div class="edit-hint" id="editHint" hidden>正在编辑课程记录</div>
        </form>
      </section>

      <section class="card">
        <h2>课程次数统计</h2>
        <div id="stats" class="stats-list"></div>
      </section>

    </aside>
  </main>

  <script>
    const STORAGE_KEY = 'course-calendar-lessons-v1';
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    let current = new Date();
    current.setDate(1);
    let lessons = loadLessons();
    let editingId = null;

    const calendar = document.getElementById('calendar');
    const monthTitle = document.getElementById('monthTitle');
    const form = document.getElementById('lessonForm');
    const lessonDate = document.getElementById('lessonDate');
    const studentName = document.getElementById('studentName');
    const courseName = document.getElementById('courseName');
    const lessonTime = document.getElementById('lessonTime');
    const lessonDuration = document.getElementById('lessonDuration');
    const lessonNote = document.getElementById('lessonNote');
    const submitLesson = document.getElementById('submitLesson');
    const editHint = document.getElementById('editHint');
    const stats = document.getElementById('stats');
    const records = document.getElementById('records');

    lessonDate.value = toDateInput(new Date());

    document.getElementById('prevMonth').addEventListener('click', () => {
      current.setMonth(current.getMonth() - 1);
      render();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      current.setMonth(current.getMonth() + 1);
      render();
    });
    document.getElementById('clearForm').addEventListener('click', resetForm);

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const item = getFormItem(editingId || createId());
      if (!item.date || !item.course) return;
      if (editingId) {
        lessons = lessons.map(existing => existing.id === editingId ? item : existing);
      } else {
        lessons.push(item);
      }
      saveLessons();
      resetForm(item.date);
      render();
    });

    function loadLessons() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function createId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
    }
    function getFormItem(id) {
      return {
        id,
        date: lessonDate.value,
        student: studentName.value,
        course: courseName.value.trim(),
        time: lessonTime.value.trim(),
        duration: lessonDuration.value,
        note: lessonNote.value.trim()
      };
    }
    function resetForm(dateValue = toDateInput(new Date())) {
      editingId = null;
      form.reset();
      studentName.value = '悠悠';
      lessonDuration.value = '1';
      lessonDate.value = dateValue;
      submitLesson.textContent = '添加课程';
      editHint.hidden = true;
    }
    function editLesson(item) {
      editingId = item.id;
      lessonDate.value = item.date;
      studentName.value = item.student || '';
      courseName.value = item.course;
      lessonTime.value = item.time || '';
      lessonDuration.value = item.duration || '1';
      lessonNote.value = item.note || '';
      submitLesson.textContent = '保存修改';
      editHint.hidden = false;
      courseName.focus();
    }
    function saveLessons() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lessons));
    }
    function toDateInput(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    function render() {
      renderCalendar();
      renderStats();
      renderRecords();
    }
    function renderCalendar() {
      calendar.innerHTML = '';
      weekdays.forEach(day => {
        const el = document.createElement('div');
        el.className = 'weekday';
        el.textContent = day;
        calendar.appendChild(el);
      });

      const year = current.getFullYear();
      const month = current.getMonth();
      monthTitle.textContent = `${year}年${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevDays = new Date(year, month, 0).getDate();
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      const todayText = toDateInput(new Date());

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'day';
        let dayNumber;
        let cellDate;

        if (i < firstDay) {
          dayNumber = prevDays - firstDay + i + 1;
          cell.classList.add('muted');
          cellDate = toDateInput(new Date(year, month - 1, dayNumber));
        } else if (i >= firstDay + daysInMonth) {
          dayNumber = i - firstDay - daysInMonth + 1;
          cell.classList.add('muted');
          cellDate = toDateInput(new Date(year, month + 1, dayNumber));
        } else {
          dayNumber = i - firstDay + 1;
          cellDate = toDateInput(new Date(year, month, dayNumber));
        }
        if (cellDate === todayText) cell.classList.add('today');

        const dateRow = document.createElement('div');
        dateRow.className = 'date-row';
        dateRow.innerHTML = `<span>${dayNumber}</span>`;
        const addBtn = document.createElement('button');
        addBtn.className = 'add-mini';
        addBtn.type = 'button';
        addBtn.textContent = '+';
        addBtn.title = '在这一天添加课程';
        addBtn.addEventListener('click', () => {
          lessonDate.value = cellDate;
          courseName.focus();
        });
        dateRow.appendChild(addBtn);
        cell.appendChild(dateRow);

        lessons
          .filter(item => item.date === cellDate)
          .sort((a, b) => a.time.localeCompare(b.time, 'zh-CN'))
          .forEach(item => {
            const lesson = document.createElement('div');
            lesson.className = 'lesson';
            lesson.innerHTML = `<strong>${item.student ? escapeHtml(item.student) + ' · ' : ''}${escapeHtml(item.course)}</strong>${item.time ? escapeHtml(item.time) : '未填写时间'} · ${formatDuration(item.duration)}`;
            if (item.note) lesson.title = item.note;
            cell.appendChild(lesson);
          });

        calendar.appendChild(cell);
      }
    }
    function renderStats() {
      const counts = lessons.reduce((map, item) => {
        map[item.course] = (map[item.course] || 0) + 1;
        return map;
      }, {});
      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'));
      stats.innerHTML = entries.length ? '' : '<div class="empty">还没有课程记录</div>';
      entries.forEach(([name, count]) => {
        const el = document.createElement('div');
        el.className = 'stat-item';
        el.innerHTML = `<strong>${escapeHtml(name)}</strong><span class="count">${count} 次</span>`;
        stats.appendChild(el);
      });
    }
    function renderRecords() {
      const sorted = [...lessons].sort((a, b) =>
        a.course.localeCompare(b.course, 'zh-CN') ||
        a.date.localeCompare(b.date) ||
        (a.time || '').localeCompare(b.time || '', 'zh-CN')
      );
      records.innerHTML = sorted.length ? '' : '<div class="empty">暂无记录</div>';

      const grouped = sorted.reduce((map, item) => {
        if (!map[item.course]) map[item.course] = [];
        map[item.course].push(item);
        return map;
      }, {});

      Object.entries(grouped).forEach(([course, items]) => {
        const group = document.createElement('section');
        group.className = 'subject-group';
        group.innerHTML = `<div class="subject-header"><h3>${escapeHtml(course)}</h3><span class="count">${items.length} 次</span></div>`;
        const list = document.createElement('div');
        list.className = 'subject-items';

        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'record-item';
          const note = item.note ? `<br><small>${escapeHtml(item.note)}</small>` : '';
          el.innerHTML = `<div><strong>${item.student ? escapeHtml(item.student) + ' · ' : ''}${escapeHtml(item.course)}</strong><br><small>${item.date}${item.time ? ' ' + escapeHtml(item.time) : ' 未填写时间'} · ${formatDuration(item.duration)}</small>${note}</div>`;

          const actions = document.createElement('div');
          actions.className = 'record-actions';
          const edit = document.createElement('button');
          edit.className = 'secondary';
          edit.type = 'button';
          edit.textContent = '编辑';
          edit.addEventListener('click', () => editLesson(item));

          const del = document.createElement('button');
          del.className = 'danger';
          del.type = 'button';
          del.textContent = '删除';
          del.addEventListener('click', () => {
            if (!confirm('确定删除这条课程记录吗？')) return;
            lessons = lessons.filter(x => x.id !== item.id);
            if (editingId === item.id) resetForm();
            saveLessons();
            render();
          });

          actions.appendChild(edit);
          actions.appendChild(del);
          el.appendChild(actions);
          list.appendChild(el);
        });

        group.appendChild(list);
        records.appendChild(group);
      });
    }
    function formatDuration(duration) {
      return `${escapeHtml(duration || '1')} 小时`;
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[ch]));
    }

    render();
  </script>
</body>
</html>
